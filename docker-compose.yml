version: '3.9'

services:
  konecta-it:
    image: konecta-it-system:latest
    container_name: konecta-it-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent database volume - data survives container restarts/updates
      - konecta_db:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/production.db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=konecta-it-system-super-secret-key-2024
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  konecta_db:
    driver: local
